<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <title>New Login Page</title>
</head>

<body>
    <!-- Main Container -->
    <div class="container-fluid vh-100">
        <div class="row">
            <!-- Left Side -->
            <div class="col-12 col-md-6 bg-white d-flex flex-column justify-content-center align-items-center">
                <!-- login form -->
                <div class="form">
                    <!-- Sector1: INTRO -->
                    <div>
                        <strong class="welcome">Welcome Back 👋</strong>
                        <p class="desc">Today is a new day. It's your day. You shape it.<br>Sign in to start managing
                            your
                            projects.</p>
                    </div>

                    <!-- Sector2: Form-->
                    <div>
                        <form>
                            <label for="email" class="label1">Email</label>
                            <input type="email" id="email" placeholder="    Example@email.com" style="width: 388px;"
                                class="input mb-3">
                            <label for="password" class="label2">Password</label>
                            <input type="password" id="password" placeholder="    At least 8 characters"
                                style="width: 388px;" class="input mb-3">
                            <a href="#" class="forgot d-block text-end mb-4">Forgot Password?</a>
                            <button class="button1">Sign In</button>
                        </form>
                    </div>

                    <!-- Sector3: Social Sign In -->
                    <div>
                        <p class="or mb-4 mt-4">
                            <span class="d-none d-md-inline">Or</span>
                            <span class="d-inline d-md-none">Or sign in with</span>
                        </p>
                        <form class="d-flex social-buttons">
                            <button class="button2">
                                <img src="assets/images/Google.png" class="me-2">
                                <span class="d-none d-md-inline me-3"> Sign in with Google </span>
                                <span class="d-inline d-md-none">Google</span>
                            </button>

                            <button class="button3">
                                <img src="assets/images/facebook.png" class="me-2">
                                <span class="d-none d-md-inline">Sign in with Facebook</span>
                                <span class="d-inline d-md-none">Facebook</span>
                            </button>
                        </form>
                    </div>
                    <p class="account text-center mt-4">Don't have an account ? <a href="#">Sign up</a></p>
                </div>
                <p class="rights text-center mt-4">© 2023 ALL RIGHTS RESERVED</p>
            </div>

            <!-- Right Side "IMAGE" -->
            <div class="col-12 col-md-6 bg-white img1">
                <img src="../assets/images/task1.jpg" class="flower w-100 rounded-5 vh-100 p-3 d-none d-md-block"
                    style="object-fit:cover">
                <img src="../assets/images/task1.jpg" class="flower d-block d-md-none">
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
